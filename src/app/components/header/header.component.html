<header class="header" [class.scrolled]="isScrolled">
  <div class="header-top">
    <div class="container">
      <span><i class="fas fa-map-marker-alt"></i> Av. Sampaio Vidal, 734 - Centro, Marília/SP</span>
      <span><i class="fab fa-whatsapp"></i> (14) 99167-7085</span>
      <span><i class="fas fa-clock"></i> Seg a Sáb: 09h às 19h</span>
    </div>
  </div>

  <nav class="navbar">
    <div class="container">
      <!-- Logo -->
      <div class="logo" (click)="scrollTo('inicio')">
        <span class="logo-saldao">SALDÃO</span>
        <span class="logo-marilia">MARÍLIA</span>
        <div class="logo-tag">MODA & PREÇO</div>
      </div>

      <!-- Desktop Menu -->
      <ul class="nav-links" [class.mobile-open]="isMobileMenuOpen">
        <li><a (click)="scrollTo('inicio')" class="nav-link">Início</a></li>
        <li><a (click)="scrollTo('produtos')" class="nav-link">Produtos</a></li>
        <li><a (click)="scrollTo('promocoes')" class="nav-link">Promoções</a></li>
        <li><a (click)="scrollTo('sobre')" class="nav-link">Sobre Nós</a></li>
        <li><a (click)="scrollTo('contato')" class="nav-link">Contato</a></li>
      </ul>

      <!-- CTA + Hamburger -->
      <div class="header-actions">
        <button class="btn-primary btn-ofertas" (click)="scrollTo('promocoes')">
          <i class="fas fa-bolt"></i> Ver Ofertas
        </button>
        <button class="hamburger" (click)="toggleMobileMenu()" [class.active]="isMobileMenuOpen">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Mobile Overlay -->
  <div class="mobile-overlay" [class.active]="isMobileMenuOpen" (click)="closeMobileMenu()"></div>

  <!-- Mobile Menu -->
  <div class="mobile-menu" [class.active]="isMobileMenuOpen">
    <ul>
      <li><a (click)="scrollTo('inicio')"><i class="fas fa-home"></i> Início</a></li>
      <li><a (click)="scrollTo('produtos')"><i class="fas fa-tshirt"></i> Produtos</a></li>
      <li><a (click)="scrollTo('promocoes')"><i class="fas fa-tag"></i> Promoções</a></li>
      <li><a (click)="scrollTo('sobre')"><i class="fas fa-store"></i> Sobre Nós</a></li>
      <li><a (click)="scrollTo('contato')"><i class="fas fa-envelope"></i> Contato</a></li>
    </ul>
    <button class="btn-primary" (click)="scrollTo('promocoes')">
      <i class="fas fa-bolt"></i> Ver Todas as Ofertas
    </button>
  </div>
</header>
