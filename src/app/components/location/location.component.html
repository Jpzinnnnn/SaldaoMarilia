<section class="location" id="localizacao">
  <div class="container">
    <div class="location-grid">
      <!-- Info -->
      <div class="location-info reveal-left">
        <span class="section-label">Localização</span>
        <h2 class="section-title loc-title">
          NOS ENCONTRE <span class="text-yellow">AQUI</span>
        </h2>

        <div class="info-cards">
          <div class="info-card">
            <div class="info-icon">
              <i class="fas fa-map-marker-alt"></i>
            </div>
            <div>
              <span class="info-label">Endereço</span>
              <span class="info-value">Av. Sampaio Vidal, 734</span>
              <span class="info-sub">Centro, Marília/SP</span>
            </div>
          </div>

          <div class="info-card">
            <div class="info-icon">
              <i class="fas fa-clock"></i>
            </div>
            <div>
              <span class="info-label">Horário de Funcionamento</span>
              <span class="info-value">Segunda a Sábado</span>
              <span class="info-sub">09h às 19h</span>
            </div>
          </div>

          <div class="info-card">
            <div class="info-icon">
              <i class="fab fa-whatsapp"></i>
            </div>
            <div>
              <span class="info-label">Atendimento WhatsApp</span>
              <span class="info-value">(14) 99167-7085</span>
              <span class="info-sub">Respondemos rapidinho!</span>
            </div>
          </div>
        </div>

        <button class="btn-primary location-btn" (click)="openMaps()">
          <i class="fas fa-directions"></i> Como Chegar
        </button>
      </div>

      <!-- Map embed -->
      <div class="location-map reveal-right">
        <div class="map-wrapper">
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3703.3!2d-49.9480!3d-22.2138!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMjLCsDEyJzQ5LjciUyA0OcKwNTYnNTIuOCJX!5e0!3m2!1spt-BR!2sbr!4v1234567890"
            width="100%"
            height="100%"
            style="border:0;"
            allowfullscreen
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
            title="Localização Saldão Marília"
          ></iframe>
          <div class="map-overlay-label">
            <i class="fas fa-store"></i>
            <span>Saldão Marília</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
